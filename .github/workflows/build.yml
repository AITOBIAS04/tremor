name: build

on:
  push:
    branches: [master]
  pull_request:

jobs:
  # Verifies that the documented CLI entry point from README.md exits 0
  # on all supported Node.js versions. The documented invocation is the
  # standalone USGS poller: `node src/oracles/usgs.js m4.5_day`.
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20.x', '22.x']
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Verify documented CLI entry point
        run: node src/oracles/usgs.js m4.5_day
